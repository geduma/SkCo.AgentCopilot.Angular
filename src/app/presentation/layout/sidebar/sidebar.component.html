<aside class="sidebar">
  <div class="sidebar__avatar">
    <div class="avatar">AB</div>
  </div>

  <nav class="sidebar__nav">
    <a routerLink="/home/customers" routerLinkActive="active" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span>Agenda Clientes</span>
    </a>
  </nav>

  <!-- AI regeneration button -->
  <div class="sidebar__ai">
    <div class="ai-divider"></div>

    <button
      class="ai-btn"
      [class.ai-btn--loading]="ai.state() === 'loading'"
      [class.ai-btn--success]="ai.state() === 'success'"
      [class.ai-btn--error]="ai.state() === 'error'"
      title="Regenerar insights y acciones con IA (Ollama)"
      (click)="ai.regenerateInsights()"
      [disabled]="ai.state() === 'loading'">
      @if (ai.state() === 'loading') {
        <span class="ai-spinner"></span>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/><path d="M19 3l.75 2.25L22 6l-2.25.75L19 9l-.75-2.25L16 6l2.25-.75z"/><path d="M5 15l.75 2.25L8 18l-2.25.75L5 21l-.75-2.25L2 18l2.25-.75z"/>
        </svg>
      }
      <span>
        @switch (ai.state()) {
          @case ('loading') { Generando... }
          @case ('success') { Actualizado }
          @case ('error') { Error }
          @default { Regenerar IA insights }
        }
      </span>
    </button>
  </div>
</aside>
